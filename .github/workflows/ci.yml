name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies (public PyPI; optional Takumi Guard)
        env:
          # If TAKUMI_GUARD_TOKEN is set in repo secrets, install via Takumi Guard proxy.
          TAKUMI_GUARD_TOKEN: ${{ secrets.TAKUMI_GUARD_TOKEN }}
        run: |
          python -m pip install --upgrade pip
          if [ -n "$TAKUMI_GUARD_TOKEN" ]; then
            export PIP_INDEX_URL="https://token:${TAKUMI_GUARD_TOKEN}@pypi.flatt.tech/simple/"
            export UV_INDEX_URL="$PIP_INDEX_URL"
          fi
          pip install -e ".[dev]"

      - name: Ruff
        run: ruff check src tests

      - name: Pytest
        run: pytest
